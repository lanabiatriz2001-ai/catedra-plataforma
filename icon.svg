<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Cátedra">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c8a5b"/>
      <stop offset="1" stop-color="#086038"/>
    </linearGradient>
    <radialGradient id="h" cx="0.22" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- full-bleed para funcionar como ícone maskable -->
  <rect width="512" height="512" fill="url(#g)"/>
  <rect width="512" height="512" fill="url(#h)"/>
  <text x="256" y="256" text-anchor="middle" dominant-baseline="central"
        font-family="Spectral, Georgia, 'Times New Roman', serif" font-weight="700"
        font-size="300" fill="#ffffff">C</text>
</svg>
